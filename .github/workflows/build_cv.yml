on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: xu-cheng/latex-action@v3
        with:
          root_file: cv-fr-exec.tex
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error
      - uses: actions/upload-artifact@v4
        with:
          name: cv-fr-exec
          path: cv-fr-exec.pdf
